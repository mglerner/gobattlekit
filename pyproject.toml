# This project was generated with 0.4.1 using template: https://github.com/beeware/briefcase-template @ v0.4.1
[tool.briefcase]
project_name = "GoBattleKit"
bundle = "com.mglerner"
version = "0.0.31"
url = "https://mglerner.com/gobattlekit"
license = "MIT"
license-files = ["LICENSE"]
author = "Michael G. Lerner"
author_email = "mglerner@protonmail.com"

[tool.briefcase.app.gobattlekit]
formal_name = "GoBattleKit"
description = "MGL's GoBattleKit App"
long_description = """More details about the app should go here.
"""
icon = "src/gobattlekit/resources/icon"
splash = "src/gobattlekit/resources/splash"
splash_background_color = "#1a3a5c"
sources = [
    "src/gobattlekit",
]
test_sources = [
    "tests",
]
requires = [
    "certifi",
]
test_requires = [
    "pytest",
]

[tool.briefcase.app.gobattlekit.macOS]
universal_build = true
requires = [
    "toga-cocoa~=0.5.0",
    "std-nslog~=1.0.3",
]

[tool.briefcase.app.gobattlekit.linux]
requires = [
    "toga-gtk~=0.5.0",
    # PyGObject 3.52.1 enforces a requirement on libgirepository-2.0-dev. This library
    # isn't available on Debian 12/Ubuntu 22.04. If you don't need to support those (or
    # older) releases, you can remove this version pin. See beeware/toga#3143.
    "pygobject < 3.52.1",
]

[tool.briefcase.app.gobattlekit.linux.system.debian]
system_requires = [
    # Needed to compile pycairo wheel
    "libcairo2-dev",
    # One of the following two packages are needed to compile PyGObject wheel. If you
    # remove the pygobject pin in the requires list, you should also change to the
    # version 2.0 of the girepository library. See beeware/toga#3143.
    "libgirepository1.0-dev",
    # "libgirepository-2.0-dev",
]

system_runtime_requires = [
    # Needed to provide GTK and its GI bindings
    "gir1.2-gtk-3.0",
    # One of the following two packages are needed to use PyGObject at runtime. If you
    # remove the pygobject pin in the requires list, you should also change to the
    # version 2.0 of the girepository library. See beeware/toga#3143.
    "libgirepository-1.0-1",
    # "libgirepository-2.0-0",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3-module",
    # Needed to provide WebKit2 at runtime
    # Note: Debian 11 requires gir1.2-webkit2-4.0 instead
    # "gir1.2-webkit2-4.1",
]

[tool.briefcase.app.gobattlekit.linux.system.rhel]
system_requires = [
    # Needed to compile pycairo wheel
    "cairo-gobject-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
]

system_runtime_requires = [
    # Needed to support Python bindings to GTK
    "gobject-introspection",
    # Needed to provide GTK
    "gtk3",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3",
    # Needed to provide WebKit2 at runtime
    # "webkit2gtk3",
]

[tool.briefcase.app.gobattlekit.linux.system.suse]
system_requires = [
    # Needed to compile pycairo wheel
    "cairo-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
]

system_runtime_requires = [
    # Needed to provide GTK
    "gtk3",
    # Needed to support Python bindings to GTK
    "gobject-introspection", "typelib(Gtk) = 3.0",
    # Dependencies that GTK looks for at runtime
    "libcanberra-gtk3-module",
    # Needed to provide WebKit2 at runtime
    # "libwebkit2gtk3", "typelib(WebKit2)",
]

[tool.briefcase.app.gobattlekit.linux.system.arch]
system_requires = [
    # Needed to compile pycairo wheel
    "cairo",
    # Needed to compile PyGObject wheel
    "gobject-introspection",
    # Runtime dependencies that need to exist so that the
    # Arch package passes final validation.
    # Needed to provide GTK
    "gtk3",
    # Dependencies that GTK looks for at runtime
    "libcanberra",
    # Needed to provide WebKit2
    # "webkit2gtk",
]

system_runtime_requires = [
    # Needed to provide GTK
    "gtk3",
    # Needed to provide PyGObject bindings
    "gobject-introspection-runtime",
    # Dependencies that GTK looks for at runtime
    "libcanberra",
    # Needed to provide WebKit2 at runtime
    # "webkit2gtk",
]

[tool.briefcase.app.gobattlekit.linux.appimage]
manylinux = "manylinux_2_28"

system_requires = [
    # Needed to compile pycairo wheel
    "cairo-gobject-devel",
    # Needed to compile PyGObject wheel
    "gobject-introspection-devel",
    # Needed to provide GTK
    "gtk3-devel",
    # Dependencies that GTK looks for at runtime, that need to be
    # in the build environment to be picked up by linuxdeploy
    "libcanberra-gtk3",
    "PackageKit-gtk3-module",
    "gvfs-client",
]

linuxdeploy_plugins = [
    "DEPLOY_GTK_VERSION=3 gtk",
]

[tool.briefcase.app.gobattlekit.linux.flatpak]
flatpak_runtime = "org.gnome.Platform"
flatpak_runtime_version = "48"
flatpak_sdk = "org.gnome.Sdk"

[tool.briefcase.app.gobattlekit.windows]
requires = [
    "toga-winforms~=0.5.0",
]

# Mobile deployments
[tool.briefcase.app.gobattlekit.iOS]
development_team = "6TV57R6ZCC"
requires = [
    "toga-iOS~=0.5.0",
    "std-nslog~=1.0.3",
    "certifi",
]


info."CFBundleDocumentTypes" = [
    {CFBundleTypeName = "CSV File", CFBundleTypeRole = "Viewer", LSHandlerRank = "Owner", LSItemContentTypes = ["public.comma-separated-values-text"]}
]
info."LSSupportsOpeningDocumentsInPlace" = false
info."UISupportedInterfaceOrientations" = ["UIInterfaceOrientationPortrait"]
info."UISupportedInterfaceOrientations~ipad" = ["UIInterfaceOrientationPortrait", "UIInterfaceOrientationPortraitUpsideDown"]
# App Store submission keys (review AP10). Without the encryption key,
# every upload asks export-compliance questions interactively.
info."ITSAppUsesNonExemptEncryption" = false
info."LSApplicationCategoryType" = "public.app-category.utilities"
# The app is dark-themed only (design decision 2026-06-12, review #11):
# force dark so iOS light mode can't render dark text on dark cards.
info."UIUserInterfaceStyle" = "Dark"
# Still to verify against real `briefcase create iOS` output in the
# App Store readiness session: explicit deployment target, build number
# strategy (currently: bump `version` per upload, per DEVELOPER_NOTES).

[tool.briefcase.app.gobattlekit.android]
requires = [
    "toga-android~=0.5.0",
]

base_theme = "Theme.MaterialComponents.Light.DarkActionBar"

android_manifest_activity_attrs_extra_content = 'android:screenOrientation="portrait"'

build_gradle_dependencies = [
    "com.google.android.material:material:1.13.0",
    # Needed for DetailedList
    # "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0",
    # Needed for MapView
    # "org.osmdroid:osmdroid-android:6.1.20",
    # Needed for WebView
    # "androidx.webkit:webkit:1.15.0",
]

# Web deployments
[tool.briefcase.app.gobattlekit.web]
requires = [
    "toga-web~=0.5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Divergence pins (e.g. the Eevee branched pre-evo xfail) must fail loudly
# when they start passing, so the pin gets flipped instead of rotting.
xfail_strict = true
filterwarnings = [
    "error::DeprecationWarning",
]

